<ion-content class="schools-page" [fullscreen]="true">

  <div class="container">

    <!-- 🌐 Language -->

    <!-- 🏫 Header -->
    <div class="header">
      <div class="logo">
        <ion-icon name="school-outline"></ion-icon>
      </div>

      <h1>Schools</h1>
 
    </div>

    <!-- 🔍 Search -->
    <ion-item lines="none" class="search-box">
   
      <ion-input
        placeholder="Search schools..."
        [(ngModel)]="searchTerm"
        (ionInput)="filterSchools()">
      </ion-input>
    </ion-item>

    <!-- ➕ Add Button -->
    <ion-button expand="block" class="add-btn" (click)="goToAddSchool()">
     
      Add School
    </ion-button>

    <!-- 🏫 List -->
    <div class="school-list">
      <div class="school-card" *ngFor="let school of filteredSchools">

        <div class="left"> 
          <div class="icon-box">
            <ion-icon name="school-outline"></ion-icon>
          </div>

          <div class="info">
            <h2>{{ school.name }}</h2>
            <p>{{ school.code }}</p>
          </div>
        </div>

        <ion-icon name="chevron-forward-outline" class="arrow"></ion-icon>

      </div>
    </div>

    <!-- Footer -->
    <div class="footer">
      © 2026 EduTrack 360
    </div>

  </div>

</ion-content>
