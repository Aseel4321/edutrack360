<ion-content class="schools-content" [fullscreen]="true">

  <!-- زر إضافة مدرسة -->
  <div class="top-icon">
    <ion-button fill="clear" class="add-btn" (click)="goToAddSchool()">
      +
    </ion-button>
  </div>

  <div class="schools-container">

    <!-- Header -->
    <div class="schools-header">

      <div class="logo-wrapper">
        <div class="logo-circle">
          <img src="assets/icon/schoolll.PNG" style="width:12vw;height:12vw;" />
        </div>
      </div>

      <h1 class="page-title">
        {{ 'schools.title' | translate }}
      </h1>

      <p class="page-subtitle">
        {{ 'schools.selectSchool' | translate }}
      </p>

    </div>

    <!-- Schools List -->
    <div class="schools-list">

      <!-- مدرسة -->
      <div class="school-card" *ngFor="let school of schools">

        <div class="school-icon">
          <img src="assets/icon/schoolll.PNG">
        </div>

        <div class="school-info">

          <!-- اسم المدرسة -->
          <h2>{{ school.name }}</h2>

          <!-- الايميل (إن وجد) -->
          <p *ngIf="school.email">
            {{ school.email }}
          </p>

          <!-- الحالة -->
          <span
            class="status"
            [ngClass]="{
              'active': school.status === 'ACTIVE',
              'inactive': school.status !== 'ACTIVE'
            }"
          >
            {{ school.status }}
          </span>

        </div>

        <!-- سهم -->
        <div class="school-arrow">
          <ion-icon name="chevron-forward-outline"></ion-icon>
        </div>

      </div>

      <!-- حالة عدم وجود مدارس -->
      <div *ngIf="schools.length === 0" class="no-schools">
        {{ 'schools.noSchools' | translate }}
      </div>

    </div>

  </div>

</ion-content>
