<ion-content class="profile-content" [fullscreen]="true">

  <div class="profile-container">
  <div class="top-icon">
      <ion-button fill="clear" class="add-btn" (click)="goBack()">
        X
      </ion-button>
    </div>
    <!-- Header -->

    <div class="profile-header">
      <div class="avatar-wrapper">
        <div class="avatar-circle">
          <img src="assets/icon/user.PNG" style="width: 12vw;height: 12vw;"/>
        </div>
      </div>
      <h1 class="profile-title"> {{ 'roles.SYSTEM_ADMIN' | translate }}</h1>
      
    </div>


    <!-- Form -->

    <form class="profile-form">

      <!-- Username -->
      <div class="form-group">
        <ion-item lines="none" class="input-item">
       
          <ion-input
            [(ngModel)]='profile.username'
            [readonly]="!isEdit"
            [placeholder]="'profile.username' | translate">
          </ion-input>
        </ion-item>
      </div>


      <!-- Email -->
      <div class="form-group">
      <ion-item lines="none" class="input-item">
    
      <ion-input
       [(ngModel)]="profile.email"
       [readonly]="!isEdit"
       [placeholder]="'profile.email' | translate">
      </ion-input>
        </ion-item>
      </div>


      <!-- Phone -->
      <div class="form-group">
        <ion-item lines="none" class="input-item">
      
          <ion-input
            [(ngModel)]="profile.phone"
            [readonly]="!isEdit"
           [placeholder]="'profile.phone' | translate">
          </ion-input>
        </ion-item>
      </div>

     <div class="form-group">
        <ion-item lines="none" class="input-item">
      
          <ion-input
            [(ngModel)]="profile.phone"
            [readonly]="!isEdit"
           [placeholder]="'profile.phone' | translate">
          </ion-input>
        </ion-item>
      </div>
      <!-- Member Since -->

      <!-- Buttons -->

      <ion-button
        expand="block"
        shape="round"
        class="profile-btn"
        *ngIf="!isEdit"
        (click)="enableEdit()">

        {{ 'common.edit' | translate }}

      </ion-button>



    </form>

  </div>

</ion-content>
