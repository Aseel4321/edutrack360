<ion-content class="forgot-content" [fullscreen]="true">
  <div class="forgot-container">

    <!-- Icon -->
    <div class="icon-circle">
      <img src="assets/icon/cloo.PNG"
           style="height: 20vw;" />
    </div>

    <!-- Title -->
    <h2 class="title">{{ 'auth.forgotPassword' | translate }}</h2>
    <p class="subtitle">
      {{ 'auth.resetPasswordDesc' | translate }}
    </p>

    <!-- Form -->
    <form
      class="form"
      [formGroup]="forgotForm"
      (ngSubmit)="submit()">

      <!-- Email Input -->
      <ion-item class="input-item" lines="none">
        <img src="assets/icon/email.png"
             style="height:9vw; margin-inline-end: 3%;" />

        <ion-input
          type="email"
          formControlName="email"
          placeholder="{{ 'auth.email' | translate }}">
        </ion-input>
      </ion-item>

      <!-- Error Message -->
       
      <!-- Submit Button -->
      <ion-button (click)="submit()"
        expand="block"
        shape="round"
        class="submit-btn"
        [disabled]="forgotForm.invalid"><ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
        <span *ngIf="!isLoading">{{ 'auth.SEND_RESET_LINK' | translate }}</span>
      </ion-button>

    </form>

    <!-- Back Button -->
    <ion-button
      fill="clear"
      class="back-btn"
      routerLink="/login"
      type="button">
      <span >{{ 'auth.BACK_TO_LOGIN' | translate }}</span>
    </ion-button>

    <!-- Footer -->
    <p class="footer">
      © 2026 EduTrack 360. All rights reserved.
    </p>

  </div>
</ion-content>
